---
# ─────────────────────────────────────────────────────────────────────────────
# RC+ξ Harness — Pre-registered defaults
#
# NOTE: This file documents the default parameter values used in all validated
# runs. It is NOT loaded automatically by the runners at runtime. Runners
# consume these values via CLI arguments with matching defaults hardcoded.
# Do not edit this file expecting it to change runner behavior — change the
# CLI arguments instead.
#
# These values match exactly what was used to produce the published results:
#   DOI: 10.5281/zenodo.17203755
# ─────────────────────────────────────────────────────────────────────────────
---
k: 5
m: 5
eps_xi: 0.02
eps_lvs: 0.015

temperature: 0.2
system_prompt: "Constant system prompt used for all runs."
seed: 42

# PLANNED — NOT YET IMPLEMENTED: OpenAI and Cohere providers are defined as stubs
# in harness/embeddings/providers.py. All validated results use sentence-transformers.
# Cross-provider replication is a planned next step.
embedding_providers:
  - sentence-transformers  # validated and implemented
  # - openai               # planned, not yet implemented
  # - cohere               # planned, not yet implemented
